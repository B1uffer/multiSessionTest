server:
  servlet:
    session:
      timeout: 30m

spring:
  application:
    name: multiSessionTest
  h2:
    console:
      enabled: true
      path: /h2-console
  datasource:
    url: jdbc:h2:mem:multiSessionTest
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
  sql:
    init:
      mode: always

logging:
  level:
    org.springframework.security: DEBUG
